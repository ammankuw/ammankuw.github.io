<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مخطط سالفورد - تفاصيل المنتجات والمقاسات</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #111;
            color: #fff;
            text-align: center;
            padding: 20px;
        }
        .header-title {
            color: #d4af37;
            font-size: 24px;
            margin-bottom: 20px;
        }
        .container {
            background-color: #fff;
            color: #000;
            border-radius: 10px;
            padding: 20px;
            max-width: 500px;
            margin: 0 auto;
        }
        .controls {
            display: flex;
            justify-content: space-around;
            margin-bottom: 15px;
        }
        .btn {
            padding: 10px 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            cursor: pointer;
            background-color: #f9f9f9;
            font-weight: bold;
        }
        .btn.active {
            background-color: #000;
            color: #fff;
        }
        /* منطقة لوحة الرسم */
        .canvas-container {
            position: relative;
            width: 100%;
            height: 400px;
            border: 2px dashed #d4af37;
            background-image: linear-gradient(#e0e0e0 1px, transparent 1px), linear-gradient(90deg, #e0e0e0 1px, transparent 1px);
            background-size: 20px 20px;
            margin-bottom: 15px;
            overflow: hidden;
        }
        /* مربع المقاس المطلوب إصلاحه ليظهر الأرقام دائماً */
        .measure-box {
            position: absolute;
            width: 120px;
            height: 60px;
            border: 2px dashed #000;
            background-color: rgba(255, 255, 255, 0.9);
            top: 50px;
            left: 150px;
            cursor: move;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            user-select: none;
            z-index: 9999; /* لضمان ظهوره فوق الرسم */
        }
        /* تنسيق الأرقام لتبدو واضحة جداً */
        .measure-text {
            color: #000000 !important; /* لون أسود صريح */
            font-size: 16px !important;
            font-weight: bold !important;
            font-family: sans-serif;
            visibility: visible !important;
            display: block !important;
        }
        .action-text {
            background-color: #f0f0f0;
            padding: 10px;
            font-size: 14px;
            border-radius: 5px;
            margin-bottom: 15px;
        }
        .footer-btns {
            display: flex;
            justify-content: space-between;
        }
        .btn-danger { background-color: #ffcccc; color: red; }
        .btn-secondary { background-color: #eee; color: #333; }
    </style>
</head>
<body>

    <div class="header-title">مخطط سالفورد</div>

    <div class="container">
        <h3>تفاصيل المنتجات والمقاسات</h3>
        <p style="color: #666;">لوحة التخطيط (ارسم بيدك ثم اسحب المقاسات):</p>

        <div class="controls">
            <button class="btn" id="btn-draw">إضافة مقاس (أخضر)</button>
            <button class="btn active" id="btn-move">✋ تحريك المقاس</button>
        </div>

        <div class="canvas-container" id="canvas-area">
            <div class="measure-box" id="my-measure-box">
                <span class="measure-text" id="dimensions-display">4.50 × 3.20 م</span>
            </div>
        </div>

        <div class="action-text">
            ✋ وضع التحريك نشط: اضغط على أي مربع مقاس أخضر لسحبه وإفلاته في مكانه المناسب.
        </div>

        <div class="footer-btns">
            <button class="btn btn-secondary" onclick="clearCanvas()">🗑️ مسح التخطيط بالكامل</button>
            <button class="btn btn-danger" onclick="deleteBox()">❌ حذف مربع القياس المحدد</button>
        </div>
    </div>

    <script>
        // كود الجافاسكربت الخاص بتحريك المربع وتحديث أرقامه
        const box = document.getElementById('my-measure-box');
        const container = document.getElementById('canvas-area');
        const dimDisplay = document.getElementById('dimensions-display');

        let isDragging = false;
        let startX, startY;

        // عند الضغط على المربع للبدء بالسحب
        box.addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = e.clientX - box.offsetLeft;
            startY = e.clientY - box.offsetTop;
            box.style.cursor = 'grabbing';
        });

        // أثناء تحريك الماوس
        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            
            let newX = e.clientX - startX;
            let newY = e.clientY - startY;

            // الحفاظ على المربع داخل حدود اللوحة
            const maxX = container.clientWidth - box.clientWidth;
            const maxY = container.clientHeight - box.clientHeight;

            newX = Math.max(0, Math.min(newX, maxX));
            newY = Math.max(0, Math.min(newY, maxY));

            box.style.left = newX + 'px';
            box.style.top = newY + 'px';

            // معادلة حسابية ديناميكية لتحديث الأرقام بناءً على الحركة (كمثال)
            // تم تثبيت النص هنا لضمان عدم اختفائه، ويمكنك ربطه بالـ ATR أو أبعادك
            let calculatedWidth = (box.clientWidth / 30).toFixed(2);
            let calculatedHeight = (box.clientHeight / 20).toFixed(2);
            dimDisplay.innerText = `${calculatedWidth} × ${calculatedHeight} م`;
        });

        // عند الإفلات
        document.addEventListener('mouseup', () => {
            isDragging = false;
            box.style.cursor = 'move';
        });

        // دعم الشاشات الذكية والهواتف (اللمس)
        box.addEventListener('touchstart', (e) => {
            isDragging = true;
            const touch = e.touches[0];
            startX = touch.clientX - box.offsetLeft;
            startY = touch.clientY - box.offsetTop;
        });

        document.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            const touch = e.touches[0];
            let newX = touch.clientX - startX;
            let newY = touch.clientY - startY;
            box.style.left = newX + 'px';
            box.style.top = newY + 'px';
        });

        document.addEventListener('touchend', () => {
            isDragging = false;
        });

        // وظائف الأزرار السفلية
        function clearCanvas() {
            alert('تم مسح اللوحة');
        }

        function deleteBox() {
            box.style.display = 'none';
        }
    </script>
</body>
</html>
